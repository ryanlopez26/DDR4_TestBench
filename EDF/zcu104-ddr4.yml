header:
  version: 14

machine: zynqmp-zcu104-ddr4-custom
distro: poky
target:
  - xilinx-bootbin
  - core-image-minimal

repos:
  poky:
    url: https://git.yoctoproject.org/poky
    branch: scarthgap
    path: /tools/edf/poky
    layers:
      meta:
      meta-poky:

  meta-arm:
    url: https://git.yoctoproject.org/meta-arm
    branch: scarthgap
    path: /tools/edf/meta-arm
    layers:
      meta-arm:
      meta-arm-toolchain:

  meta-xilinx:
    url: https://github.com/Xilinx/meta-xilinx.git
    branch: rel-v2025.2
    path: /tools/edf/meta-xilinx
    layers:
      meta-xilinx-core:
      meta-xilinx-bsp:
      meta-xilinx-standalone:
      meta-xilinx-standalone-sdt:
      meta-microblaze:

  meta-xilinx-tools:
    url: https://github.com/Xilinx/meta-xilinx-tools.git
    branch: rel-v2025.2
    path: /tools/edf/meta-xilinx-tools

  meta-amd-adaptive-socs:
    url: https://github.com/Xilinx/meta-amd-adaptive-socs.git
    branch: rel-v2025.2
    path: /tools/edf/meta-amd-adaptive-socs
    layers:
      meta-amd-adaptive-socs-core:
      meta-amd-adaptive-socs-bsp:

  meta-openembedded:
    url: https://github.com/openembedded/meta-openembedded.git
    branch: scarthgap
    path: /tools/edf/meta-openembedded
    layers:
      meta-oe:
      meta-python:

local_conf_header:
  standard: |
    MACHINE = "zynqmp-zcu104-sdt-full"
    DISTRO = "poky"
    DL_DIR = "/tools/edf/downloads"
    SSTATE_DIR = "/tools/edf/sstate-cache"
    BB_NUMBER_THREADS = "8"
    PARALLEL_MAKE = "-j 8"
    IMAGE_FSTYPES = "wic wic.bmap ext4"
    IMAGE_INSTALL:append = " fpga-manager-util devmem2 openssh"
    KERNEL_EXTRA_FEATURES:append = " features/devmem/devmem.scc"
    EXTRA_IMAGE_FEATURES ?= "debug-tweaks"
    PATCHRESOLVE = "noop"
    USER_CLASSES ?= "buildstats"
    CONF_VERSION = "2"
