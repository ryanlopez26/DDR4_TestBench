# standard
MACHINE = "zynqmp-zcu104-ddr4-custom"
DISTRO = "poky"
DL_DIR = "/tools/edf/downloads"
SSTATE_DIR = "/tools/edf/sstate-cache"
BB_NUMBER_THREADS = "24"
PARALLEL_MAKE = "-j 8"
IMAGE_FSTYPES = "wic wic.bmap ext4"
IMAGE_INSTALL:append = " fpga-manager-util devmem2 openssh"
KERNEL_EXTRA_FEATURES:append = " features/devmem/devmem.scc"
EXTRA_IMAGE_FEATURES ?= "debug-tweaks"
PATCHRESOLVE = "noop"
USER_CLASSES ?= "buildstats"
CONF_VERSION = "2"

MACHINE = "zynqmp-zcu104-sdt-full"
DISTRO = "poky"
BBMULTICONFIG ?= ""
DISTRO_FEATURES:remove = "xen"
DISTRO_FEATURES:remove = "xen"
ENABLE_XEN_DTSI = ""
ENABLE_XEN_QEMU_DTSI = ""

# Remove features not needed for headless DDR4 memory tester
DISTRO_FEATURES:remove = " \
    alsa \
    bluetooth \
    debuginfod \
    pcmcia \
    usbgadget \
    wifi \
    nfs \
    zeroconf \
    pci \
    3g \
    nfc \
    x11 \
    opengl \
    ptest \
    multiarch \
    wayland \
    vulkan \
    pulseaudio \
    gobject-introspection-data \
"
